<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nway Oo Yaung Ni - PRF</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    /* သင်ပေးထားသော CSS အားလုံးကို ဒီနေရာမှာ ထားပါ (နေရာသက်သာရန် ချုံ့ထားသည်) */
    body { margin: 0; padding: 0; font-family: 'Padauk', 'Pyidaungsu', sans-serif; background: #f2f2f2; display: flex; flex-direction: column; align-items: center; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    .prf { background: linear-gradient(to left, #550000, #b30000); color: white; padding: 40px 20px; width: 100%; text-align: center; animation: fadeUp 0.8s ease-out; }
    .logo1 { width: 90px; height: 90px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); margin-bottom: 10px; object-fit: cover; }
    .HH1 { margin: 10px 0 5px; font-size: 26px; }
    .HH2 { margin: 0; font-size: 15px; opacity: 0.9; }
    .detail, .amount { background: white; margin: 25px auto; width: 90%; max-width: 450px; border-radius: 20px; border: 4px solid #BC0D11; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 25px; animation: fadeUp 1s ease-out; }
    .detail-h { background: linear-gradient(to right, #8b0000, #b30000); color: white; padding: 12px; border-radius: 12px; text-align: center; font-size: 16px; margin-bottom: 20px; font-weight: bold; }
    table { font-size: 16px; line-height: 1.8; width: 100%; border-collapse: collapse; }
    td:first-child { color: #555; width: 60%; }
    td:last-child { font-weight: bold; text-align: right; color: #000; }
    .connect { display: inline-flex; justify-content: center; align-items: center; gap: 8px; margin: 20px auto 0; padding: 12px 20px; border: 2px solid #1877F2; background: rgba(24,119,242,0.1); color: #1877F2; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: all 0.3s ease; text-decoration: none; width: 100%; box-sizing: border-box; }
    .connect:hover { background: #1877F2; color: white; transform: translateY(-3px); }
</style>
</head>
<body>

<div class="prf">
    <img src="IMG_20260221_163347.png" class="logo1" alt="Logo">
    <h1 class="HH1">နွေဦးရောင်နီ</h1>
    <p class="HH2">ပြည်သူ့တော်လှန်ရေးထောက်ပို့တပ်-PRF</p>
</div>

<div class="detail">
    <div class="detail-h">ပြည်သူ့တော်လှန်ရေးထောက်ပို့တပ်သား အချက်လက်</div>
    <table>
        <tr><td>တပ်သားအမည် -</td><td id="name">...</td></tr>
        <tr><td>ကိုယ်ပိုင်နံပါတ် -</td><td id="id">...</td></tr>
        <tr><td>အဆင့် -</td><td id="rank">...</td></tr>
        <tr><td>စတင်ထောက်ပို့သည့်ရက်စွဲ -</td><td id="date">...</td></tr>
    </table>
</div>

<div class="amount">
    <table>
        <tr><td>စုစုပေါင်းထောက်ပို့ငွေ -</td><td id="total">...</td></tr>
        <tr><td>ယခုလ ထောက်ပို့ငွေ -</td><td id="monthly">...</td></tr>
        <tr><td>ပျက်ကွက်သည့်လ -</td><td id="missing">...</td></tr>
    </table>
    <a href="https://www.facebook.com/profile.php?id=61564237272183" target="_blank" class="connect">
       <i class="fab fa-facebook-f"></i> ဆက်သွယ်ရန် - Facebook Page
    </a>
</div>

<script>
    // URL ကနေ ID ကို ဖတ်မယ် (ဥပမာ index.html?id=NOY-0001)
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbyTMZo_WbktqEwHD-ijzndpSHGEL3nMa-aJ9_im3jTnrQSIB_tCbwgrfOnW58ypUXSC/exec ';

    if (userId) {
        fetch(`${scriptUrl}?id=${userId}`)
        .then(res => res.json())
        .then(data => {
            if (data) {
                document.getElementById('name').innerText = data.name;
                document.getElementById('id').innerText = data.id;
                document.getElementById('rank').innerText = data.rank;
                document.getElementById('date').innerText = data.startDate;
                
                // E နှင့် F မှာ "ကျပ်" ထည့်ခြင်း
                document.getElementById('total').innerText = data.totalAmount.toLocaleString() + " ကျပ်";
                document.getElementById('monthly').innerText = data.monthlyAmount.toLocaleString() + " ကျပ်";
                
                document.getElementById('missing').innerText = data.missingMonths;
            } else {
                document.body.innerHTML = "<h3 style='text-align:center; margin-top:50px;'>အချက်အလက် မတွေ့ရှိပါ။</h3>";
            }
        })
        .catch(err => console.log(err));
    } else {
        document.body.innerHTML = "<h3 style='text-align:center; margin-top:50px;'>ID မရှိပါ။ URL အဆုံးမှာ ?id=နံပါတ် ထည့်ပေးပါ။</h3>";
    }
</script>
</body>
</html>
